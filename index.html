<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Granja Monitor</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #dbeafe, #bfdbfe);
  color: #0f172a;
  overflow: hidden; /* REMOVE SCROLL */
}

/* TOPO */
.topo {
  text-align: center;
  padding: 15px;
  font-size: 26px;
  font-weight: bold;
}

/* STATUS FIXO */
.status-fixo {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 14px;
  background: white;
  padding: 8px 15px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* LAYOUT PRINCIPAL */
.main {
  display: flex;
  height: calc(100vh - 80px);
  gap: 20px;
  padding: 10px 20px 20px 20px;
  box-sizing: border-box;
}

/* ESQUERDA */
.left {
  flex: 2;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* DIREITA */
.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 15px;
  height: 100%;
}

/* CARDS */
.card {
  background: white;
  border-radius: 20px;
  padding: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* TEMPERATURA */
.temp {
  font-size: 65px;
  font-weight: bold;
}

/* CORES */
.verde { background: #16a34a; color: white; }
.amarelo { background: #f59e0b; color: white; }
.vermelho { background: #dc2626; color: white; }

/* TOP */
.top-cards {
  display: flex;
  gap: 15px;
}

/* GRÁFICO */
.grafico-box {
  flex: 1;
  min-height: 0;
}

/* SETORES */
.setor {
  font-size: 30px;
  font-weight: bold;
}

/* DISTRIBUIÇÃO IGUAL */
.right .card {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
</style>
</head>

<body>

<div class="topo">🐔 Monitoramento da Granja</div>

<div id="status" class="status-fixo">Conectando...</div>

<div class="main">

  <!-- ESQUERDA -->
  <div class="left">

    <div class="top-cards">

      <div id="cardTemp" class="card" style="flex:1.5;">
        <div style="font-size:16px;">🌡 Temperatura Geral</div>
        <div id="temp" class="temp">--</div>
      </div>

      <div class="card" style="flex:1; display:flex; flex-direction:column; justify-content:center; gap:8px;">
        
        <div>
          <div style="font-size:13px; color:#64748b;">Data</div>
          <div id="data" style="font-size:18px; font-weight:bold;"></div>
        </div>

        <div>
          <div style="font-size:13px; color:#64748b;">Hora</div>
          <div id="hora" style="font-size:24px; font-weight:bold;"></div>
        </div>

      </div>

    </div>

    <div class="card grafico-box">
      <canvas id="grafico"></canvas>
    </div>

  </div>

  <!-- DIREITA -->
  <div class="right">

    <div id="g1" class="card">
      <div>Setor 01</div>
      <div id="t1" class="setor">--</div>
    </div>

    <div id="g2" class="card">
      <div>Setor 02</div>
      <div id="t2" class="setor">--</div>
    </div>

    <div id="g3" class="card">
      <div>Setor 03</div>
      <div id="t3" class="setor">--</div>
    </div>

    <div id="g4" class="card">
      <div>Setor 04</div>
      <div id="t4" class="setor">--</div>
    </div>

  </div>

</div>

<script>

// RELÓGIO
setInterval(() => {
  const agora = new Date();
  document.getElementById("data").innerText = agora.toLocaleDateString();
  document.getElementById("hora").innerText = agora.toLocaleTimeString();
}, 1000);

// MQTT
const client = mqtt.connect('wss://g73d1422.ala.us-east-1.emqxsl.com:8084/mqtt', {
  username: 'neutron_automacao',
  password: '836822ca'
});

// GRÁFICO
let dados = [];
let labels = [];
let buffer = [];

const ctx = document.getElementById('grafico').getContext('2d');

const grafico = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'Temperatura Geral',
      data: dados,
      borderColor: '#2563eb',
      backgroundColor: 'rgba(37,99,235,0.2)',
      tension: 0.4,
      fill: true
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false
  }
});

// CORES
function cor(card, temp){
  card.classList.remove("verde","amarelo","vermelho");

  if(temp < 28) card.classList.add("verde");
  else if(temp < 32) card.classList.add("amarelo");
  else card.classList.add("vermelho");
}

// MQTT
client.on('connect', () => {
  document.getElementById('status').innerText = 'Conectado ✅';

  client.subscribe('topico_01');
  client.subscribe('topico_02');
  client.subscribe('topico_03');
  client.subscribe('topico_04');
  client.subscribe('topico_05');
});

client.on('close', () => {
  document.getElementById('status').innerText = 'Desconectado ❌';
});

client.on('error', () => {
  document.getElementById('status').innerText = 'Erro ⚠️';
});

client.on('message', (topic, message) => {

  let valor = parseFloat(message.toString());

  if(topic === 'topico_01'){
    buffer.push({ valor, hora: new Date().toLocaleTimeString() });
    document.getElementById("temp").innerText = valor + " °C";
    cor(document.getElementById("cardTemp"), valor);
  }

  if(topic === 'topico_02'){
    document.getElementById("t1").innerText = valor + " °C";
    cor(document.getElementById("g1"), valor);
  }

  if(topic === 'topico_03'){
    document.getElementById("t2").innerText = valor + " °C";
    cor(document.getElementById("g2"), valor);
  }

  if(topic === 'topico_04'){
    document.getElementById("t3").innerText = valor + " °C";
    cor(document.getElementById("g3"), valor);
  }

  if(topic === 'topico_05'){
    document.getElementById("t4").innerText = valor + " °C";
    cor(document.getElementById("g4"), valor);
  }

});

// LOOP GRÁFICO
setInterval(() => {
  if(buffer.length > 0){
    let item = buffer.shift();

    dados.push(item.valor);
    labels.push(item.hora);

    if(dados.length > 30){
      dados.shift();
      labels.shift();
    }

    grafico.update();
  }
}, 1000);

</script>

</body>
</html>
